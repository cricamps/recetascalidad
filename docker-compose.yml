version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: recetas_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: recetasdb
      MYSQL_USER: recetasuser
      MYSQL_PASSWORD: recetaspass
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./base_de_datos/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./base_de_datos/data.sql:/docker-entrypoint-initdb.d/02_data.sql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 20s
      retries: 10
  app:
    build: .
    container_name: recetas_app
    ports:
      - '8080:8080'
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/recetasdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: recetasuser
      SPRING_DATASOURCE_PASSWORD: recetaspass
    depends_on:
      db:
        condition: service_healthy
volumes:
  mysql_data:
