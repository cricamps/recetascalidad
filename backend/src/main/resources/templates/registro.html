<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro · RecetasChef</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap"
          rel="stylesheet" crossorigin="anonymous">
    <style>
        .auth-wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a0a00 0%,#3d1a00 50%,#6b2f00 100%);padding:2rem 1rem}
        .auth-card{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.4);width:100%;max-width:460px;overflow:hidden}
        .auth-header{background:linear-gradient(135deg,#c0392b,#e74c3c);padding:2rem;text-align:center;color:#fff}
        .auth-header .logo{font-size:2.5rem;display:block;margin-bottom:.5rem}
        .auth-header h1{font-size:1.5rem;margin:0;font-weight:700}
        .auth-header p{margin:.25rem 0 0;opacity:.9;font-size:.9rem}
        .auth-body{padding:2rem}
        .form-group{margin-bottom:1.25rem}
        .form-group label{display:block;font-size:.85rem;font-weight:600;color:#555;margin-bottom:.4rem}
        .form-group input{width:100%;padding:.7rem 1rem;border:2px solid #e0e0e0;border-radius:8px;font-size:.95rem;transition:border-color .2s;box-sizing:border-box}
        .form-group input:focus{outline:none;border-color:#c0392b}
        .btn-submit{width:100%;padding:.85rem;background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:.5rem}
        .btn-submit:hover{opacity:.9}
        .alert-error{background:#fdecea;border:1px solid #f5c6cb;border-radius:8px;padding:.75rem 1rem;color:#c0392b;font-size:.9rem;margin-bottom:1rem}
        .auth-footer{text-align:center;padding:1rem 2rem 1.5rem;font-size:.9rem;color:#777}
        .auth-footer a{color:#c0392b;font-weight:600;text-decoration:none}
        .auth-footer a:hover{text-decoration:underline}
        .back-home{display:block;text-align:center;margin-top:1rem;font-size:.85rem;color:#aaa;text-decoration:none}
        .back-home:hover{color:#c0392b}
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <span class="logo">🍳</span>
            <h1>Crear Cuenta</h1>
            <p>Únete a la comunidad RecetasChef</p>
        </div>
        <div class="auth-body">
            <div th:if="${error}" class="alert-error">⚠️ <span th:text="${error}">Error</span></div>
            <form th:action="@{/registro}" method="post" th:object="${registroRequest}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label for="nombreCompleto">Nombre Completo</label>
                    <input type="text" id="nombreCompleto" name="nombreCompleto"
                           placeholder="Ej: María González Pérez" required autocomplete="name"/>
                </div>
                <div class="form-group">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" name="correo"
                           placeholder="tu@correo.cl" required autocomplete="email"/>
                </div>
                <div class="form-group">
                    <label for="username">Nombre de Usuario</label>
                    <input type="text" id="username" name="username"
                           placeholder="Ej: magonzalez" required autocomplete="username"
                           minlength="3" maxlength="50"/>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password"
                           placeholder="Mínimo 6 caracteres" required
                           autocomplete="new-password" minlength="6"/>
                </div>
                <button type="submit" class="btn-submit">Crear Cuenta</button>
            </form>
        </div>
        <div class="auth-footer">¿Ya tienes cuenta? <a th:href="@{/login}">Iniciar Sesión</a></div>
        <a th:href="@{/home}" class="back-home">← Volver al inicio</a>
    </div>
</div>
</body>
</html>
