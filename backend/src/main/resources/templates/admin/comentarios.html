<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moderación de Comentarios — RecetasChef Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; margin: 0; }
        .admin-header {
            background: linear-gradient(135deg, #2c3e50, #e74c3c);
            color: white; padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .admin-header h1 { margin: 0; font-size: 1.4rem; }
        .admin-header a { color: white; text-decoration: none; font-size: 0.9rem; opacity: 0.85; }
        .admin-header a:hover { opacity: 1; }
        .admin-nav { display: flex; gap: 1.5rem; }
        .container { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
        .alert { padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.95rem; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-danger  { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .card { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 1.5rem; margin-bottom: 2rem; }
        .card h2 { margin-top: 0; color: #2c3e50; font-size: 1.1rem; border-bottom: 2px solid #e74c3c; padding-bottom: 0.5rem; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: #2c3e50; color: white; padding: 0.7rem 1rem; text-align: left; }
        td { padding: 0.65rem 1rem; border-bottom: 1px solid #eee; vertical-align: middle; }
        tr:hover td { background: #fafafa; }
        .stars { color: #f39c12; }
        .contenido-cell { max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn-danger { background: #e74c3c; color: white; border: none; padding: 0.35rem 0.75rem; border-radius: 5px; cursor: pointer; font-size: 0.82rem; }
        .btn-danger:hover { background: #c0392b; }
        .empty-msg { text-align: center; padding: 2rem; color: #888; }
        .stats { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: white; border-radius: 8px; padding: 1rem 1.5rem; box-shadow: 0 2px 6px rgba(0,0,0,0.07); text-align: center; }
        .stat-card .num { font-size: 2rem; font-weight: 700; color: #e74c3c; }
        .stat-card .lbl { font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>

<div class="admin-header">
    <h1>🔧 RecetasChef — Panel de Administración</h1>
    <nav class="admin-nav">
        <a th:href="@{/admin/usuarios}">👥 Usuarios</a>
        <a th:href="@{/admin/comentarios}" style="font-weight:700;text-decoration:underline;">💬 Comentarios</a>
        <a th:href="@{/home}">🏠 Ir al sitio</a>
    </nav>
</div>

<div class="container">

    <!-- Alertas flash -->
    <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>
    <div th:if="${error}"  class="alert alert-danger"  th:text="${error}"></div>

    <!-- Stats -->
    <div class="stats">
        <div class="stat-card">
            <div class="num" th:text="${totalComentarios}">0</div>
            <div class="lbl">Comentarios totales</div>
        </div>
    </div>

    <div class="card">
        <h2>💬 Gestión de Comentarios</h2>

        <div th:if="${comentarios == null or #lists.isEmpty(comentarios)}" class="empty-msg">
            <p>No hay comentarios registrados.</p>
        </div>

        <table th:if="${comentarios != null and !#lists.isEmpty(comentarios)}">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Receta</th>
                    <th>Autor</th>
                    <th>Contenido</th>
                    <th>Valoración</th>
                    <th>Fecha</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${comentarios}">
                    <td th:text="${c.id}">1</td>
                    <td>
                        <a th:href="@{/receta/__${c.receta.id}__}"
                           th:text="${c.receta.nombre}" style="color:#e74c3c;">Receta</a>
                    </td>
                    <td th:text="${c.autor}">usuario</td>
                    <td class="contenido-cell" th:utext="${c.contenido}">Comentario...</td>
                    <td class="stars">
                        <span th:each="i : ${#numbers.sequence(1, c.valoracion)}">★</span>
                        <span th:text="'(' + ${c.valoracion} + '/5)'" style="color:#999;font-size:0.8rem;"></span>
                    </td>
                    <td th:text="${#temporals.format(c.fechaCreacion, 'dd/MM/yyyy HH:mm')}">fecha</td>
                    <td>
                        <form th:action="@{/admin/comentarios/__${c.id}__/eliminar}" method="post"
                              onsubmit="return confirm('¿Eliminar este comentario?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn-danger">🗑 Eliminar</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
