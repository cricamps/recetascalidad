# ============================================================
#  PERFIL LOCAL  (H2 en memoria - sin necesidad de MySQL)
# ============================================================
spring.profiles.active=local

server.port=8080
server.servlet.context-path=/recetas
spring.application.name=recetas
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Seguridad de cookies (corrige alertas ZAP)
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=strict
server.error.include-stacktrace=never
server.error.include-message=never
spring.jpa.open-in-view=false

# DDL: update agrega columnas nuevas sin perder datos
spring.jpa.hibernate.ddl-auto=update

# JWT
app.jwt.secret=3f8a2b1c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a
app.jwt.expiration=86400000
