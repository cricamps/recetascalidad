<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios — RecetasChef Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; margin: 0; }

        .admin-header {
            background: linear-gradient(135deg, #2c3e50, #e74c3c);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-header h1 { margin: 0; font-size: 1.4rem; }
        .admin-header a { color: white; text-decoration: none; font-size: 0.9rem; opacity: 0.85; }
        .admin-header a:hover { opacity: 1; }

        .container { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-danger  { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .card h2 { margin-top: 0; color: #2c3e50; font-size: 1.1rem; border-bottom: 2px solid #e74c3c; padding-bottom: 0.5rem; }

        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: #2c3e50; color: white; padding: 0.7rem 1rem; text-align: left; }
        td { padding: 0.65rem 1rem; border-bottom: 1px solid #eee; vertical-align: middle; }
        tr:hover td { background: #fafafa; }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-admin  { background: #e74c3c; color: white; }
        .badge-chef   { background: #e67e22; color: white; }
        .badge-user   { background: #3498db; color: white; }

        .btn {
            padding: 0.3rem 0.7rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
        }
        .btn-danger  { background: #e74c3c; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-primary { background: #3498db; color: white; }
        .btn:hover { opacity: 0.85; }

        .form-inline { display: flex; gap: 0.4rem; align-items: center; flex-wrap: wrap; }
        .form-inline select, .form-inline input {
            padding: 0.3rem 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .crear-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.8rem; }
        .crear-form input, .crear-form select {
            padding: 0.5rem 0.7rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.9rem;
            width: 100%;
            box-sizing: border-box;
        }
        .crear-form .btn-submit {
            padding: 0.5rem 1.2rem;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            align-self: end;
        }
        .crear-form .btn-submit:hover { background: #c0392b; }

        .stats { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .stat-card {
            background: white;
            border-radius: 8px;
            padding: 1rem 1.5rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.07);
            text-align: center;
            flex: 1;
            min-width: 120px;
        }
        .stat-card .num { font-size: 2rem; font-weight: 700; color: #e74c3c; }
        .stat-card .lbl { font-size: 0.8rem; color: #666; margin-top: 0.2rem; }
    </style>
</head>
<body>

<div class="admin-header">
    <h1>🔧 Panel de Administración — Gestión de Usuarios</h1>
    <div>
        <a th:href="@{/home}">← Volver al sitio</a>
        &nbsp;|&nbsp;
        <a th:href="@{/logout}">Cerrar sesión</a>
    </div>
</div>

<div class="container">

    <!-- Alertas -->
    <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>
    <div th:if="${error}"  class="alert alert-danger"  th:text="${error}"></div>

    <!-- Estadísticas -->
    <div class="stats">
        <div class="stat-card">
            <div class="num" th:text="${#lists.size(usuarios)}">0</div>
            <div class="lbl">Total usuarios</div>
        </div>
        <div class="stat-card">
            <div class="num" th:text="${totalAdmins}">0</div>
            <div class="lbl">Administradores</div>
        </div>
        <div class="stat-card">
            <div class="num" th:text="${totalChefs}">0</div>
            <div class="lbl">Chefs</div>
        </div>
        <div class="stat-card">
            <div class="num" th:text="${totalUsuarios}">0</div>
            <div class="lbl">Usuarios regulares</div>
        </div>
    </div>

    <!-- Crear usuario -->
    <div class="card">
        <h2>➕ Crear nuevo usuario</h2>
        <form th:action="@{/admin/usuarios/crear}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="crear-form">
                <input type="text"     name="username"       placeholder="Username *"         required />
                <input type="password" name="password"       placeholder="Contraseña *"       required />
                <input type="text"     name="nombreCompleto" placeholder="Nombre completo"            />
                <input type="email"    name="correo"         placeholder="Correo electrónico"         />
                <select name="roles">
                    <option value="ROLE_USER">Usuario</option>
                    <option value="ROLE_USER,ROLE_CHEF">Chef</option>
                    <option value="ROLE_USER,ROLE_ADMIN">Administrador</option>
                </select>
                <button type="submit" class="btn-submit">Crear usuario</button>
            </div>
        </form>
    </div>

    <!-- Tabla de usuarios -->
    <div class="card">
        <h2>👥 Usuarios registrados</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Nombre completo</th>
                    <th>Correo</th>
                    <th>Rol actual</th>
                    <th>Cambiar rol</th>
                    <th>Reset contraseña</th>
                    <th>Eliminar</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${usuarios}">
                    <td th:text="${u.id}"></td>
                    <td><strong th:text="${u.username}"></strong></td>
                    <td th:text="${u.nombreCompleto != null ? u.nombreCompleto : '—'}"></td>
                    <td th:text="${u.correo != null ? u.correo : '—'}"></td>
                    <td>
                        <span th:if="${u.roles.contains('ROLE_ADMIN')}" class="badge badge-admin">Admin</span>
                        <span th:if="${u.roles.contains('ROLE_CHEF') and !u.roles.contains('ROLE_ADMIN')}" class="badge badge-chef">Chef</span>
                        <span th:if="${!u.roles.contains('ROLE_ADMIN') and !u.roles.contains('ROLE_CHEF')}" class="badge badge-user">Usuario</span>
                    </td>
                    <!-- Cambiar rol -->
                    <td>
                        <form th:action="@{/admin/usuarios/{id}/rol(id=${u.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <div class="form-inline">
                                <select name="rol">
                                    <option value="ROLE_USER">Usuario</option>
                                    <option value="ROLE_USER,ROLE_CHEF">Chef</option>
                                    <option value="ROLE_USER,ROLE_ADMIN">Admin</option>
                                </select>
                                <button type="submit" class="btn btn-primary">Aplicar</button>
                            </div>
                        </form>
                    </td>
                    <!-- Reset contraseña -->
                    <td>
                        <form th:action="@{/admin/usuarios/{id}/reset-password(id=${u.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <div class="form-inline">
                                <input type="password" name="nuevaPassword" placeholder="Nueva clave" required style="width:110px"/>
                                <button type="submit" class="btn btn-warning">Reset</button>
                            </div>
                        </form>
                    </td>
                    <!-- Eliminar -->
                    <td>
                        <form th:action="@{/admin/usuarios/{id}/eliminar(id=${u.id})}" method="post"
                              onsubmit="return confirm('¿Eliminar al usuario ' + [[${u.username}]] + '?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-danger">Eliminar</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
